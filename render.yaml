# Render Blueprint for the Mindspace demo deployment (FREE TIER).
#
# Free-tier constraints honoured:
#   - No `preDeployCommand` on services (not supported on free).
#     Migrations + demo seed run MANUALLY via Render Shell after the
#     first deploy (one-off; subsequent deploys are clean).
#   - No Render `cron` service (not available on free).
#     Nightly demo-data reset runs via GitHub Actions instead — see
#     .github/workflows/render-demo-reset.yml. Free for public repos.
#
# Usage (one-time setup):
#   1. Sign in at https://dashboard.render.com (sign up with GitHub).
#   2. New + → Blueprint → connect this repo → select render.yaml.
#   3. Render provisions the three resources below.
#   4. After the first deploy reaches "Live": open the backend service
#      → Shell, and run TWO commands:
#         node scripts/bootstrap-render-db.js     # applies schema + 10 migrations
#         node scripts/seed-demo-data.js          # creates the demo user + 7-day window
#   5. Visit https://mindspace-demo.onrender.com — log in as
#      demo@mindspace.local / DemoMindspace!2026.
#
# After this manual first-time bootstrap:
#   - Subsequent code pushes to main auto-deploy.
#   - bootstrap-render-db.js is idempotent (CREATE TABLE IF NOT EXISTS),
#     so if you ever need to re-run it on a code change you can without
#     wiping data.
#   - The GitHub-Actions nightly cron handles demo-data reset.
#
# Demo URL pattern (Render auto-assigns):
#   https://mindspace-demo.onrender.com       (static frontend)
#   https://mindspace-demo-api.onrender.com   (backend)
#
# Demo credentials (defined in backend/scripts/seed-demo-data.js):
#   email:    demo@mindspace.local
#   password: DemoMindspace!2026

# The demo database is hosted on Neon (free and durable — no 30-day expiry like
# Render's free Postgres, which is what took the demo down in July 2026). Set
# DATABASE_URL on the backend service (below) to the Neon pooled connection
# string. No Render-managed database is provisioned by this Blueprint.

services:
  # ---------------------------------------------------------------------
  # Backend API — Node/Express in Docker, identical to local docker-compose
  # ---------------------------------------------------------------------
  - type: web
    name: mindspace-demo-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    # NOTE: free tier does not support preDeployCommand.
    # Run `node scripts/bootstrap-render-db.js` MANUALLY via Render Shell
    # after the first deploy. See blueprint header comment.
    envVars:
      - key: NODE_ENV
        # `staging` rather than `production` so the global error handler
        # returns the real error message + stack in HTTP responses. This
        # is a public demo, not a real production environment — the
        # production-error-hiding hardening doesn't matter and makes
        # debugging deploy-time issues much harder. Flip back to
        # `production` if/when the demo is ever made user-facing.
        value: staging
      - key: PORT
        value: 5000
      # Free tier blocks both `preDeployCommand` AND Shell access. To still
      # apply schema + migrations on first deploy, the Dockerfile CMD checks
      # for this env var and runs bootstrap-render-db.js on every container
      # startup. Bootstrap is idempotent (CREATE TABLE IF NOT EXISTS).
      - key: AUTO_MIGRATE
        value: "true"
      # BOOTSTRAP_DROP_ALL was set to "true" in commits 5311fcc + c96ff4b
      # to recover from a partial-schema state left by earlier failed
      # deploys. After the c96ff4b deploy went Live and /auth/register
      # started working (verified 2026-06-10), it was removed so future
      # code deploys don't keep wiping demo data. The wipe support stays
      # in bootstrap-render-db.sh and can be re-enabled by adding the
      # env var back, if ever needed.
      # Database connection — the demo DB is hosted on Neon. Paste the Neon
      # pooled connection string into DATABASE_URL in the Render dashboard
      # (kept out of source control via `sync: false`). The backend pool and
      # every script (bootstrap/reset/seed) read DATABASE_URL directly.
      - key: DATABASE_URL
        sync: false
      # Neon requires TLS. NODE_ENV is `staging` here (not production), so the
      # pool's SSL is off by default; DB_SSL=true turns it on for Neon.
      - key: DB_SSL
        value: "true"
      # Secrets — Render generates random values on first deploy.
      # The demo doesn't share secrets with the local dev environment.
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: JWT_EXPIRE
        value: 4h
      - key: ALLOWED_ORIGINS
        value: https://mindspace-demo.onrender.com
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: LUNA_PROVIDER
        value: rule_based
      # Optional integrations — leave empty (off) for the demo
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:noreply@mindspace-demo.local

  # ---------------------------------------------------------------------
  # Frontend — Vite static build
  # ---------------------------------------------------------------------
  - type: web
    name: mindspace-demo
    runtime: static
    # NOTE: static sites on Render have no `plan` field — they're free by
    # default in their own category, distinct from web-service plans.
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      # Build-time env var (Vite bakes this into the bundle)
      - key: VITE_API_BASE_URL
        value: https://mindspace-demo-api.onrender.com/api
    # SPA routing — every URL rewrites to index.html so React Router works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Light security headers for the demo
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

  # NOTE: Render's `cron` service type has no free tier.
  # The nightly demo-data reset is implemented via GitHub Actions instead —
  # see .github/workflows/render-demo-reset.yml. Free for public repos,
  # same 03:00 UTC schedule.
