server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page-app routing: fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional reverse proxy to the backend API (used only if the frontend
    # calls relative /api paths). The default build calls the backend
    # directly on http://localhost:5000/api, so this is a convenience
    # fallback and does not change the default behaviour.
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for Socket.io
    location /socket.io/ {
        proxy_pass http://backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Basic static asset caching
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
