name: Render demo nightly reset

# Free-tier-friendly substitute for Render's $1/month cron service.
# Runs nightly at 03:00 UTC; connects to the Render-hosted Postgres,
# wipes user-created accounts, clears the demo user's mood entries +
# sentiments, and re-seeds via the existing backend/scripts/reset-demo.js
# script (which spawns seed-demo-data.js to re-create the 7-day window).
#
# Free on public repos (Mindspace is MIT and public). Free on private
# repos up to 2000 minutes/month — this job runs ~2 min/day = ~60 min/month.
#
# Required repository secrets (set in repo → Settings → Secrets & variables
# → Actions → Repository secrets):
#   RENDER_DATABASE_URL   — Postgres connection string of the demo database,
#                           now hosted on Neon (Neon console → your project →
#                           Connection Details → "Pooled connection" string,
#                           which includes ?sslmode=require). reset-demo.js
#                           connects over SSL. (Name kept for compatibility.)
#   RENDER_API_BASE       — Public API URL of the Render demo backend,
#                           e.g. https://mindspace-demo-api.onrender.com/api
#                           (note the trailing /api).
#
# Manual trigger:
#   GitHub Actions tab → Render demo nightly reset → Run workflow.

on:
  # Nightly at 03:00 UTC. Re-enabled 2026-07 after making the seeder key-free:
  # seed-demo-data.js now seeds the demo user's notes as plaintext with
  # is_encrypted = FALSE and connects via its own DATABASE_URL pool, so it no
  # longer needs the backend's auto-generated ENCRYPTION_KEY (which GitHub
  # Actions cannot read). The seeder needs only DATABASE_URL + API_BASE_URL,
  # both already provided below. Kept backdating (direct DB insert) so the
  # demo's 7-day mood chart stays populated.
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  reset:
    name: Reset demo data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Skip the run if the required secrets aren't configured yet
    # (e.g. before you've finished the one-time Render setup).
    if: ${{ vars.RENDER_DEMO_ENABLED != 'false' }}

    env:
      DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
      API_BASE_URL: ${{ secrets.RENDER_API_BASE }}

    steps:
      - name: Check secrets are present
        id: check
        run: |
          if [ -z "$DATABASE_URL" ] || [ -z "$API_BASE_URL" ]; then
            echo "::notice::RENDER_DATABASE_URL and/or RENDER_API_BASE secret(s) not configured yet; skipping reset (this is normal until both secrets are added to repo settings)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Both secrets present — proceeding"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies (only what reset-demo needs)
        if: steps.check.outputs.skip != 'true'
        working-directory: backend
        # Production-only install — skips dev-deps to keep the job fast.
        run: npm ci --omit=dev

      - name: Run reset-demo.js
        if: steps.check.outputs.skip != 'true'
        working-directory: backend
        run: node scripts/reset-demo.js
