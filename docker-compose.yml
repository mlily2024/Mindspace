# Mindspace — full-stack development stack (PostgreSQL + backend + frontend)
#
# Usage:
#   1. Copy .env.docker.example to .env and fill in the secrets
#   2. docker compose up --build
#   3. Frontend: http://localhost:3000   Backend: http://localhost:5000
#
# The PostgreSQL schema AND all migrations 001-008 are auto-applied on
# first boot by scripts/docker-db-init.sh (mounted into postgres's
# /docker-entrypoint-initdb.d/). Use `docker compose down -v` to reset.
#
# Optional features (LLM Luna, Web Push) are enabled by setting the
# corresponding env vars in your .env file — see .env.docker.example.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mental_health_tracker}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # The init.sh runs schema.sql + every migration in order on first
      # boot. /db-init/ is read by the script; the .sh in initdb.d is
      # what postgres actually executes.
      - ./scripts/docker-db-init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - ./backend/database/schema.sql:/db-init/schema.sql:ro
      - ./backend/database/migrations:/db-init/migrations:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mental_health_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mental_health_tracker}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-4h}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      # Optional: LLM-backed Luna (default OFF — falls back to rule-based)
      LUNA_PROVIDER: ${LUNA_PROVIDER:-rule_based}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional: Web Push notifications (default OFF — Socket.io still works)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:noreply@mindspace.local}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
