name: Visual Screenshots

# Captures per-page screenshots of the running app on every push to main
# and every PR targeting main. Uploads the resulting PNGs as a workflow
# artefact so a reviewer can manually compare against the previous main
# artefact to spot UI regressions.
#
# This is the F.4 "medium" scope from FUTURE_WORKS — artefact-upload only,
# no pixel-diff assertions, no baseline images committed, no flakiness
# risk. Upgrade path to full visual regression (Playwright's
# toHaveScreenshot() with pixel-diff threshold) is straightforward later
# when the project has multiple contributors who'd benefit from automatic
# regression blocking.
#
# This workflow is SEPARATE from the main CI workflow so any flakiness
# (Playwright timeouts, demo seed transient failures) does NOT block
# merges. The PR's merge gate remains the existing backend + frontend CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  screenshots:
    name: Capture screenshots and upload artefact
    runs-on: ubuntu-latest
    # Don't fail the workflow on capture problems — this is informational,
    # not a merge gate. Reviewers can still inspect the artefact if any
    # subset of pages captured.
    continue-on-error: true
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: mindspace_test
          POSTGRES_PASSWORD: mindspace_test_password
          POSTGRES_DB: mindspace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mindspace_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      # DB connection (matches the backend CI job env values)
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: mindspace_test
      DB_USER: mindspace_test
      DB_PASSWORD: mindspace_test_password
      # Throwaway secrets for the CI run only
      JWT_SECRET: ci_jwt_secret_at_least_thirty_two_characters_long_for_screenshot_runs
      JWT_EXPIRE: 4h
      ENCRYPTION_KEY: ci_encryption_key_thirty_two_characters_long_screenshots
      ADMIN_PASSWORD: ci_admin_password_for_screenshot_runs_only
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 10000
      ALLOWED_ORIGINS: http://localhost:5173
      LUNA_PROVIDER: rule_based
      PORT: 5000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright chromium browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -U mindspace_test -d mindspace_test; then
              echo "Postgres ready after $i attempts"
              exit 0
            fi
            echo "Waiting for Postgres ($i/30)..."
            sleep 2
          done
          echo "Postgres did not become ready"
          exit 1

      - name: Apply database schema
        working-directory: backend
        run: |
          PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -U $DB_USER -d $DB_NAME -f database/schema.sql

      - name: Apply numbered migrations
        working-directory: backend
        run: |
          for migration in database/migrations/*.sql; do
            if [ -f "$migration" ]; then
              echo "Applying $migration"
              PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -U $DB_USER -d $DB_NAME -f "$migration"
            fi
          done

      - name: Start backend in background
        working-directory: backend
        run: |
          npm start > /tmp/backend.log 2>&1 &
          echo "Backend started with PID $!"
          for i in {1..30}; do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "Backend ready after $i attempts"
              exit 0
            fi
            echo "Waiting for backend ($i/30)..."
            sleep 2
          done
          echo "Backend did not become ready — log tail:"
          tail -50 /tmp/backend.log || true
          exit 1

      - name: Start frontend dev server in background
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:5000/api
        run: |
          npm run dev -- --host 0.0.0.0 --port 5173 > /tmp/frontend.log 2>&1 &
          echo "Frontend started with PID $!"
          for i in {1..30}; do
            if curl -sf http://localhost:5173 > /dev/null; then
              echo "Frontend ready after $i attempts"
              exit 0
            fi
            echo "Waiting for frontend ($i/30)..."
            sleep 2
          done
          echo "Frontend did not become ready — log tail:"
          tail -50 /tmp/frontend.log || true
          exit 1

      - name: Seed demo user + 7-day mood window
        working-directory: backend
        env:
          SEED_API_BASE: http://localhost:5000/api
        run: node scripts/seed-demo-data.js

      - name: Capture screenshots
        working-directory: frontend
        env:
          FRONTEND_URL: http://localhost:5173
        run: npm run screenshots

      - name: Upload screenshots artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-screenshots
          path: docs/screenshots/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload server logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            /tmp/backend.log
            /tmp/frontend.log
          if-no-files-found: ignore
